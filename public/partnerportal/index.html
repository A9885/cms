<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal - SIGNTRAL</title>
    <meta name="description" content="SIGNTRAL Partner Portal - Monitor your screen performance, earnings, and inventory.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

    <!-- Leaflet Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Portal CSS -->
    <link rel="stylesheet" href="/partnerportal/css/partner.css">

    <style>
        /* Sidebar UI Improvement Overrides */
        :root {
            --sidebar-bg: #0f172a; 
            --sidebar-active-bg: rgba(99, 102, 241, 0.1);
            --sidebar-border: rgba(255, 255, 255, 0.08);
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%) !important;
            border-right: 1px solid var(--sidebar-border);
        }

        .sidebar-brand {
            padding: 2.5rem 1.5rem !important;
            border-bottom: 1px solid var(--sidebar-border);
            margin-bottom: 0.5rem;
        }

        .brand-name { font-size: 1.2rem !important; letter-spacing: -0.5px; }
        .brand-role { color: #818cf8 !important; font-size: 0.6rem !important; letter-spacing: 1.2px !important; }

        .sidebar-nav { padding: 1rem 0; }

        .nav-item {
            margin: 4px 12px !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.88rem !important;
            border-left: none !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .nav-item i, .nav-item svg { 
            width: 18px !important; height: 18px !important; 
            opacity: 0.6; 
            transition: all 0.3s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05) !important;
            color: #fff !important;
        }
        .nav-item:hover i, .nav-item:hover svg { opacity: 1; transform: scale(1.1); }

        .nav-item.active {
            background: var(--sidebar-active-bg) !important;
            color: #fff !important;
            font-weight: 600 !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }
        .nav-item.active i, .nav-item.active svg { opacity: 1; color: #818cf8 !important; }

        .nav-item.active::after {
            content: '';
            position: absolute;
            left: -12px;
            top: 20%;
            bottom: 20%;
            width: 4px;
            background: #818cf8;
            border-radius: 0 4px 4px 0;
        }

        .nav-badge {
            background: #818cf8 !important;
            color: #fff !important;
            border-radius: 6px !important;
            font-size: 0.6rem !important;
            padding: 2px 8px !important;
        }

        .sidebar-bottom {
            padding: 1rem 0 !important;
            border-top: 1px solid var(--sidebar-border);
        }
    </style>
</head>
<body>

<div class="portal-layout">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <rect width="28" height="28" rx="8" fill="#6366f1"/>
                    <path d="M6 8h16M6 14h10M6 20h13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <div>
                <div class="brand-name">SIGNTRAL</div>
                <div class="brand-role">Partner Portal</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-view="dashboard" id="nav-dashboard">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-view="screens" id="nav-screens">
                <i data-lucide="monitor"></i>
                <span>My Screens</span>
                <span class="nav-badge" id="badge-screens">—</span>
            </a>
            <a href="#" class="nav-item" data-view="earnings" id="nav-earnings">
                <i data-lucide="bar-chart-2"></i>
                <span>Earnings</span>
            </a>
            <a href="#" class="nav-item" data-view="support" id="nav-support">
                <i data-lucide="life-buoy"></i>
                <span>Support</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <a href="#" class="nav-item" data-view="profile" id="nav-profile">
                <i data-lucide="user-circle"></i>
                <span>Profile</span>
            </a>
            <a href="#" class="nav-item nav-logout" id="logout-trigger">
                <i data-lucide="log-out"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="main-wrap">

        <!-- Top Header -->
        <header class="top-bar">
            <div class="top-bar-left">
                <h1 id="page-title">Dashboard</h1>
            </div>
            <div class="top-bar-right">
                <div class="partner-chip" id="partner-chip">
                    <div class="partner-avatar" id="partner-avatar">P</div>
                    <div>
                        <div id="partner-name-display" style="font-size:0.85rem;font-weight:700;color:#0f172a;">Loading...</div>
                        <div id="partner-email-display" style="font-size:0.7rem;color:#64748b;">Partner</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- View Container -->
        <div class="view-wrap" id="view-wrap">
            <div class="loader-center" id="global-loader">
                <div class="spinner"></div>
            </div>
        </div>

    </main>
</div>

<script src="/partnerportal/js/app.js"></script>
</body>
</html>
