<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xibo Admin Portal</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/admin.css">

    <!-- Lightweight Icons (Feather or Boxicons logic) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/assets/logo-white.png" alt="Signtral" style="width: 32px; height: 32px; object-fit: contain;">
                <h2 style="text-transform: none; letter-spacing: -0.02em; font-size: 1.2rem;">Signtral</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="#screens" class="nav-item" data-view="screens">
                    <i data-lucide="tv"></i> Screens
                </a>
                <a href="#inventory" class="nav-item" data-view="inventory">
                    <i data-lucide="grid"></i> Inventory (Slots)
                </a>
                <a href="#analytics" class="nav-item" data-view="analytics">
                    <i data-lucide="bar-chart-3"></i> Analytics (Proof of Play)
                </a>
                <a href="#brands" class="nav-item" data-view="brands">
                    <i data-lucide="briefcase"></i> Brands
                </a>
                <a href="#partners" class="nav-item" data-view="partners">
                    <i data-lucide="users"></i> Partners
                </a>
                <a href="#admins" class="nav-item" data-view="admins" id="nav-admins" style="display: none;">
                    <i data-lucide="shield-check"></i> Admin Users
                </a>
                <a href="#campaigns" class="nav-item" data-view="campaigns">
                    <i data-lucide="calendar"></i> Campaigns
                </a>
                <a href="#creative" class="nav-item" data-view="creative">
                    <i data-lucide="image"></i> Creative Library
                </a>
                <a href="#moderation" class="nav-item" data-view="moderation">
                    <i data-lucide="activity"></i> Activity Log
                </a>

                <!-- TODO: Enable in v2.0 -->
                <div class="nav-item coming-soon">
                    <i data-lucide="credit-card"></i> Billing & Payments
                    <span class="badge">Coming Soon</span>
                </div>
                <a href="#subscriptions" class="nav-item" data-view="subscriptions">
                    <i data-lucide="calendar-check"></i> Subscriptions
                </a>
                <a href="#monitoring" class="nav-item" data-view="monitoring">
                    <i data-lucide="activity"></i> System Monitoring
                </a>
                <a href="#settings" class="nav-item" data-view="settings">
                    <i data-lucide="settings"></i> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/manager.html" class="nav-item">
                    <i data-lucide="external-link"></i> Upload Portal
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-title" id="dynamic-header-title">Admin Dashboard</div>

                <div class="header-actions">
                    <i data-lucide="search" style="color: var(--text-muted); width: 16px;"></i>
                    <input type="text" placeholder="Search...">
                    <div class="user-profile"
                        style="margin-left: 10px; border-left: 1px solid var(--border); padding-left: 15px;">
                        <img id="user-avatar" src="https://ui-avatars.com/api/?name=Admin&background=random" alt="User">
                        <div class="user-info">
                            <span class="name" id="admin-user-name">Loading...</span>
                            <span class="email" id="admin-user-email">...</span>
                        </div>
                        <button data-onclick="App.logout" title="Logout" style="background:none; border:none; color:var(--text-muted); cursor:pointer; margin-left:15px; display:flex; align-items:center;">
                            <i data-lucide="log-out" style="width:18px;"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Dynamic View Container -->
            <div id="view-container" class="view-container">
                <!-- Views injected here by app.js -->
            </div>
        </main>
    </div>

    <!-- Application Logic -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>

    <!-- Inject JS logic -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <!-- View Components -->
    <script src="views/dashboard.js?v=1.0.3"></script>
    <script src="views/inventory.js?v=1.0.2"></script>
    <script src="views/screens.js?v=1.0.2"></script>
    <script src="views/brands.js?v=1.0.2"></script>
    <script src="views/partners.js?v=1.0.2"></script>
    <script src="views/campaigns.js?v=1.0.2"></script>
    <script src="views/creative.js?v=1.0.2"></script>
    <script src="views/moderation.js?v=2.0.1"></script>
    <script src="views/analytics.js?v=1.0.2"></script>
    <script src="views/billing.js?v=1.0.2"></script>
    <script src="views/subscriptions.js?v=1.0.2"></script>
    <script src="views/monitoring.js?v=1.0.2"></script>
    <script src="views/settings.js?v=1.0.2"></script>
    <script src="views/admins.js?v=1.0.0"></script>

</body>

</html>
