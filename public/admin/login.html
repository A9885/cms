<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SIGNTRAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #fff; padding: 3rem; border-radius: 32px; box-shadow: 0 40px 100px rgba(15, 23, 42, 0.08); width: 420px; text-align: center; border: 1px solid rgba(15, 23, 42, 0.03); }
        .logo-container { margin-bottom: 2.5rem; display: flex; align-items: center; justify-content: center; gap: 12px; color: #2563eb; }
        .logo-container h1 { font-size: 1.6rem; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #475569; margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; font-family: inherit; box-sizing: border-box; background: #f8fafc; transition: 0.2s; }
        .form-control:focus { outline: none; border-color: #2563eb; background: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .btn-primary { width: 100%; background: #2563eb; color: #fff; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; margin-top: 10px; }
        .btn-primary:hover { background: #1e40af; transform: translateY(-1px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 15px; display: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-container">
            <img src="/assets/logo-color.png" alt="Signtral" style="width: 48px; height: 48px; object-fit: contain;">
            <h1>Signtral</h1>
        </div>
        <div style="margin-bottom: 2rem; color: #64748b; font-size: 0.95rem;">Enter your credentials to access the portal</div>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn-primary" id="login-btn">Secure Login</button>
            <div class="error-msg" id="error-msg"></div>
        </form>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('error-msg');
            btn.innerText = 'Authenticating...';
            btn.disabled = true;
            err.style.display = 'none';

            try {
                const usernameInput = document.getElementById('username').value;
                const passwordInput = document.getElementById('password').value;
                const isEmail = usernameInput.includes('@');
                const endpoint = isEmail ? '/api/auth/sign-in/email' : '/api/auth/sign-in/username';
                const body = isEmail ? { email: usernameInput, password: passwordInput } : { username: usernameInput, password: passwordInput };

                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await res.json();
                if (res.ok) {
                    // Successful login, Better Auth has already set the cookies.
                    // Now we get user role to decide redirect. 
                    // Better Auth returns { user, session }
                    const user = data.user;
                    if (user.role === 'Brand') {
                        window.location.href = '/brandportal/index.html';
                    } else if (user.role === 'Partner') {
                        window.location.href = '/partnerportal/index.html';
                    } else {
                        window.location.href = '/admin/index.html';
                    }
                } else {
                    err.innerText = data.message || 'Login failed';
                    err.style.display = 'block';
                }
            } catch (e) {
                err.innerText = 'Network error. Try again.';
                err.style.display = 'block';
            } finally {
                btn.innerText = 'Secure Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
